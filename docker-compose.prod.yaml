services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - backend

  redis:
    image: redis:7-alpine
    networks:
      - backend

  playwright-service:
    image: browserless/chrome:latest
    networks:
      - backend


  backend:
    build:
      context: ../rag-backend
    volumes:
      - backend_data:/app/data
    environment:
      KEYCLOAK_URL: "http://keycloak:8080/auth"
      DATABASE_URL: postgresql://${POSTGRES_USER:-raguser}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ragdb}
      QDRANT_URL: http://qdrant:6333
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      FIRECRAWL_URL: ${FIRECRAWL_URL:-http://firecrawl-api:3002}
      FIRECRAWL_KEY: ${FIRECRAWL_KEY}
      OLLAMA_URL: ${OLLAMA_URL:-https://llm.ai.e-infra.cz/v1}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-llama-4-scout-17b-16e-instruct}
      CORS_ORIGINS: ${CORS_ORIGINS}
      KEYCLOAK_PUBLIC_URL: https://${KC_HOSTNAME}/auth
    depends_on:
      - postgres
      - qdrant
    networks:
      - backend

  frontend:
    build:
      context: ../rag-frontend
    depends_on:
      - backend
      - keycloak
    networks:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./nginx.conf:/etc/nginx/conf.d/default.conf:ro"
      - "./ssl/server.crt:/etc/nginx/ssl/server.crt:ro"
      - "./ssl/server.key:/etc/nginx/ssl/server.key:ro"
    depends_on:
      - frontend
      - backend
      - keycloak
    networks:
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    command: start-dev --import-realm --proxy-headers xforwarded
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ragdb}
      KC_DB_USERNAME: ${POSTGRES_USER:-raguser}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_PROXY: edge
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
    volumes:
      - "./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro"
    depends_on:
      - postgres
    networks:
      - backend
networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  backend_data:
